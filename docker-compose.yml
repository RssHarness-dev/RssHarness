# ── RssHarness + RSSHub 一体化部署 ──
# docker-compose up -d 即可启动全部服务

services:
  rsshub:
    image: diygod/rsshub:chromium-bundled
    ports:
      - "1200:1200"
    restart: unless-stopped
    environment:
      - CACHE_TYPE=memory

  rssharness:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - rsshub
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-your-key-here}
      - RSSHARNESS_ROUTES_URL=http://rsshub:1200/rsshub/routes/zh
    volumes:
      - rssharness_data:/app/data
    stdin_open: true   # CLI interactive mode
    tty: true

volumes:
  rssharness_data:

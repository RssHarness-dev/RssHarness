spring.application.name=rssgse

rss.config-path=config/rss-sources.json
rss.instance-path=config/rss-instances.json

org.eclipse.store.storage-directory=./data/eclipse-store
org.eclipse.store.channel-count=2

# DeepSeek Chat (via Spring AI)
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:your-api-key-here}
spring.ai.deepseek.chat.model=deepseek-v4-flash
#spring.ai.deepseek.chat.temperature=0.3

# RSSGSE AI
rssgse.routes-url=${RSSGSE_ROUTES_URL:http://127.0.0.1:1200/rsshub/routes/zh}
rssgse.default-platforms=zhihu,weibo,github,v2ex,hackernews

# CLI REPL — enabled by default; tests override to false via application-test.properties
rssgse.cli.enabled=true

# RSS fetch cooldown (seconds) — per specific route path, not per template
rss.fetch-interval=60

# Logging — DEBUG for AI tools + RSS fetch; WARN for production
logging.level.com.fanexmp.rssgse=INFO

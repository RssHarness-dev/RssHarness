# =============================================================================
# Test Profile Configuration — overrides all production settings for testing
# See: TestAiConfig.java (spring.factories) for mock ChatModel bean
# =============================================================================

spring.application.name=rssagent

# ── RSS domain: test fixtures ──
rss.config-path=src/test/config/rss-sources.json
rss.instance-path=src/test/config/rss-instances.json
rss.fetch-interval=0

# ── Storage: isolated test directory ──
org.eclipse.store.storage-directory=./src/test/data/eclipse-store
org.eclipse.store.channel-count=2

# ── DeepSeek: stub key → auto-config skips real ChatModel, mock takes over ──
spring.ai.deepseek.api-key=test-key-placeholder
spring.ai.deepseek.chat.model=deepseek-chat
spring.ai.deepseek.chat.temperature=0.1
spring.ai.deepseek.chat.top-p=0.9

# ── AI domain ──
rssagent.routes-url=http://127.0.0.1:1200/rsshub/routes/zh

# ── CLI: always off in tests (overrides production rssagent.cli.enabled=true) ──
rssagent.cli.enabled=false